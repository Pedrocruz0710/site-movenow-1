    <section class="s2">
        <section class="content">

            <section class="flex">
                <div class="formulario">
                    <form id="formulario-contato">
                        <h2>Entre em contato</h2>
                        <div class="input-group">
                            <label for="nome">Nome Completo</label>
                            <input type="text" id="nome" name="nome" placeholder="Seu nome" required>
                        </div>
                        <div class="input-group">
                            <label for="email">E-mail</label>
                            <input type="email" id="email" name="email" placeholder="seu@email.com" required>
                        </div>
                        <div class="input-group">
                            <label for="telefone">Telefone / WhatsApp</label>
                            <input type="tel" id="telefone" name="telefone" placeholder="(11) 99999-9999" maxlength="15"
                                required>
                        </div>
                        <button type="submit" class="btn-enviar">ENVIAR</button>
                    </form>
                </div>
                <div class="image-logo">
                
                </div>
            </section>

            <div class="botoes">
                <button id="whatsapp" class="btn-inferior"></button>
                <button id="instagram" class="btn-inferior"></button>
                <button id="linkedin" class="btn-inferior"></button>
                <button id="gmail" class="btn-inferior"></button>
            </div>

        </section>
